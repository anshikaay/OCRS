<!DOCTYPE html>
<html>
<head>
    <title>Add Course</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="dashboard-container">

    <div class="sidebar">
        <h2>Admin</h2>
        <ul>
            <li><a href="{{ url_for('admin_dashboard') }}">Dashboard</a></li>
            <li><a href="{{ url_for('add_course') }}">Add Course</a></li>
                 <li><a href="{{ url_for('admin_view_courses') }}">View Courses</a></li>
            <li><a href="view_students.html">View Students</a></li>
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
    </div>
<div class="form-card">
    <form method="POST">

<div class="input-group">
    <label>Category</label>
    <select name="category_id" required>
        {% for category in categories %}
            <option value="{{ category['id'] }}">
                {{ category['name'] }}
            </option>
        {% endfor %}
    </select>
</div>
<div class="input-group">
    <label>Capacity</label>
    <input type="number" name="capacity" required>
</div>
    <div class="input-group">
        <label>Course Name</label>
        <input type="text" name="name" placeholder="Enter course name" required>
    </div>

    <div class="input-group">
        <label>Course Code</label>
        <input type="text" name="code" placeholder="Enter course code" required>
    </div>

    <div class="input-group">
        <label>Credits</label>
        <input type="number" name="credits" min="1" max="6" required>
    </div>

    <div class="input-group">
        <label>Instructor</label>
        <input type="text" name="instructor" placeholder="Instructor name" required>
    </div>

    <div class="input-group">
        <label>Semester</label>
        <select name="semester" required>
            <option value="">Select Semester</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
        </select>
    </div>

    <button type="submit" class="primary-btn">
        Add Course
    </button>

</form>
        </div>

    </div>

</div>

</body>
</html>
