<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="dashboard-container">

    <div class="sidebar">
        <h2>Admin</h2>
        <ul>
            <li><a href="{{ url_for('admin_dashboard') }}">Dashboard</a></li>
            <li><a href="{{ url_for('add_course') }}">Add Course</a></li>
                 <li><a href="{{ url_for('admin_view_courses') }}">View Courses</a></li>
            <li><a href="view_students.html">View Students</a></li>
            <li><a href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
    </div>

<h1>Edit Course</h1>

<div class="form-card">
    <form method="POST">

        <div class="input-group">
            <label>Course Name</label>
            <input type="text" name="name"
                   value="{{ course['name'] }}" required>
        </div>

        <div class="input-group">
            <label>Course Code</label>
            <input type="text" name="code"
                   value="{{ course['code'] }}" required>
        </div>

        <div class="input-group">
            <label>Credits</label>
            <input type="number" name="credits"
                   value="{{ course['credits'] }}" required>
        </div>

        <div class="input-group">
            <label>Instructor</label>
            <input type="text" name="instructor"
                   value="{{ course['instructor'] }}" required>
        </div>

        <div class="input-group">
            <label>Semester</label>
            <input type="text" name="semester"
                   value="{{ course['semester'] }}" required>
        </div>

        <button type="submit" class="primary-btn">
            Update Course
        </button>

    </form>
</div>
</div>
</div>

</body>
</html>
